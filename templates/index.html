<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>NexusNAS</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link rel="stylesheet" href="/static/css/style.css?v=6">
    <link rel="icon" type="image/svg+xml" href="/static/img/icon.svg">
    <link rel="manifest" href="/static/manifest.json">
    <link rel="apple-touch-icon" href="/static/img/icon-192.png">
    <meta name="theme-color" content="#0c0c10">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="NexusNAS">
</head>
<body>

<div id="toast-container" class="toast-container"></div>

<!-- Auth Screen -->
<div id="auth-screen" class="auth-screen">
    <div class="auth-card">
        <div class="auth-logo">
            <div class="logo-icon"><svg viewBox="0 0 24 24" fill="currentColor" width="32" height="32"><path d="M4 4h16a2 2 0 012 2v3a2 2 0 01-2 2H4a2 2 0 01-2-2V6a2 2 0 012-2zm0 9h16a2 2 0 012 2v3a2 2 0 01-2 2H4a2 2 0 01-2-2v-3a2 2 0 012-2zm13-5a1 1 0 100-2 1 1 0 000 2zm0 9a1 1 0 100-2 1 1 0 000 2z"/></svg></div>
            <h1>NexusNAS</h1>
            <p>Stockage réseau intelligent</p>
        </div>
        <div class="auth-tabs">
            <button class="auth-tab active" data-tab="login" onclick="switchAuthTab('login')">Connexion</button>
            <button class="auth-tab" data-tab="register" onclick="switchAuthTab('register')">Inscription</button>
        </div>
        <form id="login-form" onsubmit="handleLogin(event)">
            <div class="form-group"><label>Nom d'utilisateur</label><input class="form-input" name="username" type="text" placeholder="votre_pseudo" autocomplete="username" required></div>
            <div class="form-group"><label>Mot de passe</label><div class="pw-wrapper"><input class="form-input" name="password" type="password" placeholder="••••••••" autocomplete="current-password" required><button type="button" class="pw-toggle" onclick="togglePw(this)"><svg viewBox="0 0 24 24" fill="currentColor" width="18" height="18"><path d="M12 4.5C7 4.5 2.73 7.61 1 12c1.73 4.39 6 7.5 11 7.5s9.27-3.11 11-7.5c-1.73-4.39-6-7.5-11-7.5zm0 12.5a5 5 0 110-10 5 5 0 010 10zm0-8a3 3 0 100 6 3 3 0 000-6z"/></svg></button></div></div>
            <button class="btn btn-primary" type="submit">Se connecter</button>
        </form>
        <form id="register-form" style="display:none;" onsubmit="handleRegister(event)">
            <div class="form-group"><label>Nom d'utilisateur</label><input class="form-input" name="username" type="text" placeholder="votre_pseudo" autocomplete="username" required></div>
            <div class="form-group"><label>Email</label><input class="form-input" name="email" type="email" placeholder="vous@email.com" autocomplete="email" required></div>
            <div class="form-group"><label>Mot de passe</label><div class="pw-wrapper"><input class="form-input" name="password" type="password" placeholder="••••••••" autocomplete="new-password" required><button type="button" class="pw-toggle" onclick="togglePw(this)"><svg viewBox="0 0 24 24" fill="currentColor" width="18" height="18"><path d="M12 4.5C7 4.5 2.73 7.61 1 12c1.73 4.39 6 7.5 11 7.5s9.27-3.11 11-7.5c-1.73-4.39-6-7.5-11-7.5zm0 12.5a5 5 0 110-10 5 5 0 010 10zm0-8a3 3 0 100 6 3 3 0 000-6z"/></svg></button></div></div>
            <div class="form-group"><label>Confirmer</label><div class="pw-wrapper"><input class="form-input" name="confirm" type="password" placeholder="••••••••" autocomplete="new-password" required><button type="button" class="pw-toggle" onclick="togglePw(this)"><svg viewBox="0 0 24 24" fill="currentColor" width="18" height="18"><path d="M12 4.5C7 4.5 2.73 7.61 1 12c1.73 4.39 6 7.5 11 7.5s9.27-3.11 11-7.5c-1.73-4.39-6-7.5-11-7.5zm0 12.5a5 5 0 110-10 5 5 0 010 10zm0-8a3 3 0 100 6 3 3 0 000-6z"/></svg></button></div></div>
            <button class="btn btn-primary" type="submit">Créer mon compte</button>
        </form>
    </div>
</div>

<!-- App Layout -->
<div id="app-layout" class="app-layout" style="display:none;">

    <!-- Desktop Sidebar -->
    <aside class="desktop-sidebar" id="desktop-sidebar">
        <div class="ds-header">
            <div class="ds-brand">
                <div class="ds-brand-icon"><svg viewBox="0 0 24 24" fill="currentColor" width="20" height="20"><path d="M4 4h16a2 2 0 012 2v3a2 2 0 01-2 2H4a2 2 0 01-2-2V6a2 2 0 012-2zm0 9h16a2 2 0 012 2v3a2 2 0 01-2 2H4a2 2 0 01-2-2v-3a2 2 0 012-2zm13-5a1 1 0 100-2 1 1 0 000 2zm0 9a1 1 0 100-2 1 1 0 000 2z"/></svg></div>
                <div><h2>NexusNAS</h2><span>v1.0.0</span></div>
            </div>
        </div>
        <nav class="ds-nav" id="ds-nav"></nav>
        <div class="ds-footer">
            <div class="user-avatar" id="ds-avatar">M</div>
            <div class="user-info"><div class="user-name" id="ds-username">User</div><div class="user-role" id="ds-role">User</div></div>
            <button class="logout-btn" onclick="logout()"><svg viewBox="0 0 24 24" fill="currentColor" width="18" height="18"><path d="M17 7l-1.41 1.41L18.17 11H8v2h10.17l-2.58 2.58L17 17l5-5-5-5zM4 5h8V3H4a2 2 0 00-2 2v14a2 2 0 002 2h8v-2H4V5z"/></svg></button>
        </div>
    </aside>

    <!-- Main -->
    <main class="main-content">
        <header class="main-header">
            <div class="header-brand"><svg viewBox="0 0 24 24" fill="var(--red)" width="22" height="22"><path d="M4 4h16a2 2 0 012 2v3a2 2 0 01-2 2H4a2 2 0 01-2-2V6a2 2 0 012-2zm0 9h16a2 2 0 012 2v3a2 2 0 01-2 2H4a2 2 0 01-2-2v-3a2 2 0 012-2zm13-5a1 1 0 100-2 1 1 0 000 2zm0 9a1 1 0 100-2 1 1 0 000 2z"/></svg> NexusNAS</div>
            <div class="header-search"><span class="search-icon"><svg viewBox="0 0 24 24" fill="currentColor" width="16" height="16"><path d="M15.5 14h-.79l-.28-.27A6.47 6.47 0 0016 9.5 6.5 6.5 0 109.5 16c1.61 0 3.09-.59 4.23-1.57l.27.28v.79l5 4.99L20.49 19l-4.99-5zm-6 0C7.01 14 5 11.99 5 9.5S7.01 5 9.5 5 14 7.01 14 9.5 11.99 14 9.5 14z"/></svg></span><input type="text" id="search-input" placeholder="Rechercher..."></div>
            <div class="header-actions">
                <button class="btn btn-primary btn-sm" onclick="openUploadOverlay()" style="width:auto;padding:7px 14px;gap:4px;"><svg viewBox="0 0 24 24" fill="currentColor" width="16" height="16"><path d="M12 4l-7 7h4v7h6v-7h4l-7-7zM4 19v2h16v-2H4z"/></svg> Upload</button>
            </div>
        </header>
        <div class="content-area" id="content-area">
            <div class="loading-center"><div class="spinner"></div></div>
        </div>
    </main>

    <!-- Bottom Nav (mobile) -->
    <nav class="bottom-nav" id="bottom-nav">
        <button class="nav-tab active" data-section="dashboard" onclick="navigateTo('dashboard')">
            <svg viewBox="0 0 24 24" fill="currentColor" width="22" height="22"><path d="M12 3L4 9v12h5v-7h6v7h5V9z"/></svg>
            <span>Accueil</span>
        </button>
        <button class="nav-tab" data-section="files" onclick="navigateTo('files')">
            <svg viewBox="0 0 24 24" fill="currentColor" width="22" height="22"><path d="M4 4h5l2 2h9a1 1 0 011 1v11a1 1 0 01-1 1H4a1 1 0 01-1-1V5a1 1 0 011-1z"/></svg>
            <span>Fichiers</span>
        </button>
        <button class="nav-tab upload-tab" onclick="openUploadOverlay()">
            <div class="upload-fab"><svg viewBox="0 0 24 24" fill="currentColor" width="24" height="24"><path d="M12 4l-7 7h4v7h6v-7h4l-7-7z"/></svg></div>
        </button>
        <button class="nav-tab" data-section="favorites" onclick="navigateTo('favorites')">
            <svg viewBox="0 0 24 24" fill="currentColor" width="22" height="22"><path d="M12 2l3.09 6.26L22 9.27l-5 4.87 1.18 6.88L12 17.77l-6.18 3.25L7 14.14 2 9.27l6.91-1.01z"/></svg>
            <span>Favoris</span>
        </button>
        <button class="nav-tab" data-section="settings" onclick="navigateTo('settings')">
            <svg viewBox="0 0 24 24" fill="currentColor" width="22" height="22"><path d="M12 15.5A3.5 3.5 0 1012 8.5a3.5 3.5 0 000 7zm7.43-2.53c.04-.32.07-.64.07-.97s-.03-.66-.07-.97l2.11-1.65a.5.5 0 00.12-.64l-2-3.46a.5.5 0 00-.61-.22l-2.49 1a7.06 7.06 0 00-1.67-.97l-.38-2.65A.49.49 0 0014 2h-4a.49.49 0 00-.49.42l-.38 2.65c-.61.25-1.17.59-1.67.97l-2.49-1a.5.5 0 00-.61.22l-2 3.46a.49.49 0 00.12.64l2.11 1.65c-.04.32-.07.65-.07.97s.03.66.07.97l-2.11 1.65a.5.5 0 00-.12.64l2 3.46a.5.5 0 00.61.22l2.49-1c.5.38 1.06.72 1.67.97l.38 2.65c.05.24.26.42.49.42h4c.24 0 .44-.18.49-.42l.38-2.65c.61-.25 1.17-.59 1.67-.97l2.49 1a.5.5 0 00.61-.22l2-3.46a.49.49 0 00-.12-.64l-2.11-1.65z"/></svg>
            <span>Réglages</span>
        </button>
    </nav>
</div>

<!-- Upload Overlay -->
<div id="upload-overlay" class="upload-overlay">
    <div id="upload-zone" class="upload-zone">
        <div class="upload-icon"><svg viewBox="0 0 24 24" fill="currentColor" width="48" height="48"><path d="M12 4l-7 7h4v7h6v-7h4l-7-7zM4 19v2h16v-2H4z"/></svg></div>
        <h3>Glissez vos fichiers ici</h3>
        <p>ou cliquez pour sélectionner</p>
        <button class="btn btn-secondary" style="width:auto;">Parcourir</button>
        <input type="file" id="upload-input" multiple hidden>
    </div>
</div>
<div id="upload-progress" class="upload-progress"></div>

<!-- Modal -->
<div id="modal-overlay" class="modal-overlay" onclick="if(event.target===this)closeModal()">
    <div class="modal">
        <div class="modal-title" id="modal-title"></div>
        <div id="modal-body"></div>
        <div class="modal-actions">
            <button class="btn btn-secondary btn-sm" onclick="closeModal()">Annuler</button>
            <button class="btn btn-primary btn-sm" style="width:auto;" onclick="confirmModal()">Confirmer</button>
        </div>
    </div>
</div>

<!-- Preview -->
<div id="preview-overlay" class="preview-overlay">
    <div class="preview-header">
        <span id="preview-title" class="preview-title"></span>
        <button class="btn btn-primary btn-sm" id="preview-download-btn" style="width:auto;padding:6px 12px;gap:4px;margin-right:8px;" onclick="downloadPreviewFile()"><svg viewBox="0 0 24 24" fill="currentColor" width="16" height="16"><path d="M12 16l7-7h-4V2h-6v7H5l7 7zM4 19v2h16v-2H4z"/></svg> Enregistrer</button>
        <button class="btn btn-ghost btn-sm" onclick="closePreview()"><svg viewBox="0 0 24 24" fill="currentColor" width="18" height="18"><path d="M19 6.41L17.59 5 12 10.59 6.41 5 5 6.41 10.59 12 5 17.59 6.41 19 12 13.41 17.59 19 19 17.59 13.41 12z"/></svg></button>
    </div>
    <div class="preview-body" id="preview-body"></div>
</div>

<!-- Context Menu -->
<div id="context-menu" class="context-menu"></div>

<script src="/static/js/icons.js?v=6"></script>
<script src="/static/js/app.js?v=6"></script>
<script>
if ('serviceWorker' in navigator) {
    navigator.serviceWorker.getRegistrations().then(regs => regs.forEach(r => r.unregister()));
}
</script>
</body>
</html>
