<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1A1A2E"/>
      <stop offset="100%" style="stop-color:#0A0A0B"/>
    </linearGradient>
  </defs>
  <rect width="512" height="512" rx="96" fill="url(#bg)"/>
  <!-- HDD body -->
  <rect x="96" y="146" width="320" height="220" rx="24" fill="#16161A" stroke="#E63946" stroke-width="6"/>
  <!-- Top line -->
  <rect x="120" y="180" width="200" height="8" rx="4" fill="#E63946" opacity="0.7"/>
  <rect x="120" y="204" width="140" height="8" rx="4" fill="#E63946" opacity="0.4"/>
  <!-- LED dots -->
  <circle cx="380" cy="190" r="10" fill="#E63946">
    <animate attributeName="opacity" values="1;0.3;1" dur="2s" repeatCount="indefinite"/>
  </circle>
  <circle cx="380" cy="220" r="10" fill="#4ADE80" opacity="0.8"/>
  <!-- Disk platter -->
  <circle cx="300" cy="310" r="40" fill="none" stroke="#E63946" stroke-width="3" opacity="0.5"/>
  <circle cx="300" cy="310" r="16" fill="#E63946" opacity="0.6"/>
  <!-- NAS text -->
  <text x="256" y="440" text-anchor="middle" font-family="Arial,sans-serif" font-weight="bold" font-size="48" fill="#FFFFFF" letter-spacing="8">NEXUS</text>
</svg>
